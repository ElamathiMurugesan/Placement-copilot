<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Kai Placement Copilot — AI-powered structured placement preparation coaching for engineering students. Reduce placement anxiety with personalized plans, mock interviews, and readiness scoring." />
  <title>Kai Placement Copilot — AI-Powered Placement Coach</title>

  <!-- Styles -->
  <link rel="stylesheet" href="styles/global.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/auth.css" />
  <link rel="stylesheet" href="styles/setup.css" />
  <link rel="stylesheet" href="styles/dashboard.css" />
  <link rel="stylesheet" href="styles/notes.css" />
  <link rel="stylesheet" href="styles/intel.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- html2canvas (for PNG export) -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <!-- jsPDF (for PDF export) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    /* Additional inline micro-styles */
    .selected {
      outline: none;
    }

    .progress-bar.success .progress-fill {
      background: var(--success) !important;
    }

    .progress-bar.danger .progress-fill {
      background: var(--danger) !important;
    }

    .rb-fill {
      max-width: 100%;
    }

    .notif-dropdown {
      transform-origin: top right;
    }

    @media print {

      .sidebar,
      .topnav {
        display: none !important;
      }
    }
  </style>
</head>

<body>
  <!-- PAGE LOADER -->
  <div id="page-loader">
    <div style="text-align:center;">
      <div
        style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#4F46E5,#06B6D4);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:900;color:#fff;margin:0 auto 20px;">
        K</div>
      <div class="loader-spinner" style="margin:0 auto 16px;"></div>
      <div style="font-size:0.9rem;font-weight:600;color:#64748B;">Kai Placement Copilot</div>
      <div style="font-size:0.75rem;color:#94A3B8;margin-top:4px;">Loading your workspace…</div>
    </div>
  </div>

  <!-- APP ROOT -->
  <div id="app"></div>

  <!-- APP ENTRY POINT (ES Module) -->
  <script type="module" src="js/app.js"></script>
</body>

</html>
